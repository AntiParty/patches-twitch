<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Authenticated</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #111;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .success-message {
      padding: 3rem;
      border-radius: 16px;
    }

    .success-message h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #66ff99;
    }

    .success-message p {
      font-size: 1.2rem;
      color: #ccc;
    }

    /* Footer styles */
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 2rem;
      background-color: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      box-shadow: 0 -6px 18px rgba(255, 80, 80, 0.25);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transform: translateY(100%);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .site-footer.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .footer-content {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      flex-wrap: nowrap;
    }

    .site-footer p {
      margin: 0;
      font-weight: 500;
      color: #ccc;
      white-space: nowrap;
    }

    .footer-nav {
      display: flex;
      gap: 2rem;
    }

    .footer-nav a {
      color: #ff6868;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
      padding: 6px 12px;
      border-radius: 8px;
    }

    .footer-nav a:hover,
    .footer-nav a:focus {
      color: #ff4545;
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .site-footer {
        flex-direction: column;
        padding: 20px 2rem;
        gap: 1rem;
        text-align: center;
      }

      .footer-content {
        flex-direction: column;
        gap: 1rem;
      }

      .footer-nav {
        justify-content: center;
        flex-wrap: wrap;
        gap: 1.25rem;
      }

      .site-footer p {
        white-space: normal;
      }
    }
  </style>
</head>
<body>

  <main>
    <div class="success-message">
      <h1>Successfully Authenticated with Twitch</h1>
      <p>You're now Authenticated. Please do /mod FinalsRR to begin, then do !help</p>
    </div>
  </main>
</body>
</html>
