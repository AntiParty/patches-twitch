openapi: 3.0.0
info:
  title: Twitch Bot API
  version: 1.0.0
  description: API for Twitch bot functionality

servers:
  - url: https://app.antiparty.dev
    description: Production server

paths:
  /login:
    get:
      summary: Initiate Twitch OAuth login
      responses:
        '302':
          description: Redirect to Twitch OAuth
      x-cloudflare:
        enabled: true
        log: true

  /callback:
    get:
      summary: OAuth callback endpoint
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authentication successful
        '400':
          description: Invalid code
        '500':
          description: Authentication failed
      x-cloudflare:
        enabled: true
        log: true
        rate_limit:
          window: 900
          requests: 20

  /eventsub/webhook:
    post:
      summary: Twitch EventSub webhook endpoint
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                challenge:
                  type: string
                subscription:
                  type: object
                  properties:
                    id:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                    version:
                      type: string
                    condition:
                      type: object
                    transport:
                      type: object
                    created_at:
                      type: string
                event:
                  type: object
      headers:
        Twitch-Eventsub-Message-Type:
          schema:
            type: string
          required: true
        Twitch-Eventsub-Message-Id:
          schema:
            type: string
          required: true
        Twitch-Eventsub-Message-Timestamp:
          schema:
            type: string
          required: true
        Twitch-Eventsub-Message-Signature:
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Verification challenge response
          content:
            text/plain:
              schema:
                type: string
        '204':
          description: Notification processed successfully
        '400':
          description: Bad request
        '403':
          description: Forbidden (signature verification failed)
      x-cloudflare:
        enabled: true
        log: true

  /eventsub/status:
    get:
      summary: Check EventSub subscription status
      responses:
        '200':
          description: Current subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  subscriptions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        status:
                          type: string
                        created_at:
                          type: string
                        broadcaster_user_id:
                          type: string
                        callback:
                          type: string
        '500':
          description: Internal server error
      x-cloudflare:
        enabled: true
        log: true

  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  uptime:
                    type: number
                  memory:
                    type: object
                    properties:
                      rss:
                        type: number
                      heapUsed:
                        type: number
                      heapTotal:
                        type: number
                  cpu:
                    type: object
                    properties:
                      user:
                        type: number
                      system:
                        type: number
                  database:
                    type: string
        '500':
          description: Service is unhealthy
      x-cloudflare:
        enabled: true
        log: true

  /:
    get:
      summary: Root endpoint
      responses:
        '200':
          description: Empty response
      x-cloudflare:
        enabled: true
        log: false