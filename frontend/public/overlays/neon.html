<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Finals - Neon Glow Overlay</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --neon-blue: #00f0ff;
        --neon-pink: #ff00ff;
        --neon-purple: #9147ff;
        --dark-bg: #0a0a0a;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: transparent;
        font-family: "Orbitron", sans-serif;
        overflow: hidden;
        color: #fff;
        display: flex;
        justify-content: flex-start;
        align-items: flex-start;
        height: 100vh;
        width: 100vw;
      }

      .neon-shard {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 12px 25px;
        background: var(--dark-bg);
        border: 2px solid var(--neon-purple);
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(145, 71, 255, 0.5),
          inset 0 0 20px rgba(145, 71, 255, 0.2);

        position: absolute;
        top: 20px;
        left: 20px;

        /* Slight skew for dynamic look */
        transform: skewX(-10deg);
        /* Fix text skew */
      }

      .stat-group {
        display: flex;
        flex-direction: column;
        line-height: 1;
        transform: skewX(10deg); /* Counter skew */
      }

      .stat-label {
        font-size: 10px;
        font-weight: 500;
        color: var(--neon-blue);
        text-transform: uppercase;
        margin-bottom: 4px;
        text-shadow: 0 0 5px rgba(0, 240, 255, 0.6);
        letter-spacing: 1px;
      }

      .stat-value {
        font-size: 20px;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        white-space: nowrap;
      }

      .divider {
        width: 2px;
        height: 25px;
        background: var(--neon-purple);
        box-shadow: 0 0 8px var(--neon-purple);
        transform: skewX(10deg);
      }

      .session-val.positive {
        color: #00ff88;
        text-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
      }

      .session-val.negative {
        color: #ff4444;
        text-shadow: 0 0 8px rgba(255, 68, 68, 0.6);
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div class="neon-shard" id="main-container">
      <div class="stat-group" id="group-name">
        <div class="stat-label">Contestant</div>
        <div class="stat-value" id="player-name">---</div>
      </div>

      <div class="divider"></div>

      <div class="stat-group" id="group-rank">
        <div class="stat-label">Rank</div>
        <div class="stat-value" id="rank-value">---</div>
      </div>

      <div class="divider"></div>

      <div class="stat-group" id="group-score">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score-value">---</div>
      </div>

      <div class="divider"></div>

      <div class="stat-group" id="group-wt">
        <div class="stat-label">WT Rank</div>
        <div class="stat-value" id="wt-value">---</div>
      </div>

      <div class="divider"></div>

      <div class="stat-group" id="group-session">
        <div class="stat-label">Session</div>
        <div class="stat-value session-val" id="session-change">---</div>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");
      const isPreview = urlParams.get("preview") === "true";

      let config = {
        theme: "neon",
        primaryColor: "#9147ff",
        layout: { mode: "compact", visibility: {} },
      };

      async function fetchConfig() {
        if (!token) return;
        try {
          const res = await fetch(`/api/overlay/config/${token}`);
          if (res.ok) {
            const data = await res.json();
            config.primaryColor = data.primaryColor || "#9147ff";
            config.layout = data.layout || { mode: "compact", visibility: {} };

            document.documentElement.style.setProperty(
              "--neon-purple",
              config.primaryColor
            );
            applyVisibility();
          }
        } catch (e) {
          console.error("Failed to fetch config", e);
        }
      }

      function applyVisibility() {
        const v = config.layout.visibility || {};

        // Helper to hide group and following divider
        const toggleGroup = (id, hide) => {
          const el = document.getElementById(id);
          if (!el) return;
          if (hide) {
            el.classList.add("hidden");
            if (
              el.nextElementSibling &&
              el.nextElementSibling.classList.contains("divider")
            ) {
              el.nextElementSibling.classList.add("hidden");
            }
          } else {
            el.classList.remove("hidden");
            if (
              el.nextElementSibling &&
              el.nextElementSibling.classList.contains("divider")
            ) {
              el.nextElementSibling.classList.remove("hidden");
            }
          }
        };

        toggleGroup("group-name", v.hideName);
        toggleGroup("group-rank", v.hideRank);
        toggleGroup("group-score", v.hideScore);
        toggleGroup("group-wt", v.hideWT);
        toggleGroup("group-session", v.hideSession);

        // Clean up trailing dividers
        const container = document.getElementById("main-container");
        const visibleChildren = Array.from(container.children).filter(
          (c) => !c.classList.contains("hidden")
        );
        if (
          visibleChildren.length > 0 &&
          visibleChildren[visibleChildren.length - 1].classList.contains(
            "divider"
          )
        ) {
          visibleChildren[visibleChildren.length - 1].classList.add("hidden");
        }
      }

      async function updateOverlay() {
        if (isPreview) {
          document.getElementById("player-name").textContent = "MOCK_USER";
          document.getElementById("rank-value").textContent = "Diamond 1";
          document.getElementById("score-value").textContent = "45,250";
          document.getElementById("wt-value").textContent = "#1337";
          document.getElementById("session-change").textContent = "+250";
          document.getElementById("session-change").className =
            "stat-value session-val positive";
          return;
        }

        if (!token) return;

        try {
          const res = await fetch(`/api/overlay/data/${token}`);
          if (!res.ok) return;

          const data = await res.json();

          document.getElementById("player-name").textContent =
            data.playerName || "Unknown";
          document.getElementById("rank-value").textContent =
            data.league || "-"; // Using league name like "Gold 1"
          document.getElementById("score-value").textContent =
            data.rankScore?.toLocaleString() || "-";
          document.getElementById("wt-value").textContent =
            data.worldTourRank || "Unranked";

          const sessionEl = document.getElementById("session-change");
          if (data.sessionChange !== undefined && data.sessionChange !== 0) {
            const change =
              data.sessionChange > 0
                ? `+${data.sessionChange}`
                : data.sessionChange;
            sessionEl.textContent = `${change}`;
            sessionEl.className =
              data.sessionChange > 0
                ? "stat-value session-val positive"
                : "stat-value session-val negative";
          } else {
            sessionEl.textContent = "0";
            sessionEl.className = "stat-value session-val";
          }
        } catch (e) {
          console.error("Error updating overlay:", e);
        }
      }

      fetchConfig().then(() => {
        updateOverlay();
        if (!isPreview) {
          setInterval(updateOverlay, 30000);
        }
      });
    </script>
  </body>
</html>
